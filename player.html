<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Premium Player | Story Caller</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/artplayer/dist/artplayer.js"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; }
        .artplayer-app { width: 100vw; height: 100vh; }
        video { width: 100%; height: 100%; display: block; }
        
        .back-btn {
            position: absolute; top: 20px; left: 20px; z-index: 999;
            background: rgba(0,0,0,0.6); color: white; padding: 8px 16px;
            border-radius: 30px; text-decoration: none; font-size: 14px;
            border: 1px solid rgba(255,255,255,0.2); backdrop-filter: blur(10px);
        }

        /* Click Overlay to Force Landscape */
        #force-click {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1000; display: flex; justify-content: center; align-items: center;
            background: rgba(0,0,0,0.8); color: white; cursor: pointer;
            font-family: sans-serif; text-align: center;
        }
    </style>
</head>
<body>

    <div id="force-click">
        <div>
            <div style="font-size: 40px; margin-bottom: 10px;">▶</div>
            <p>Click to Start in Fullscreen</p>
        </div>
    </div>

    <a href="index.html" class="back-btn"><i class="fas fa-arrow-left"></i></a>
    <div class="artplayer-app"></div>

    <script>
        const videoSrc = localStorage.getItem("videoLink");
        const overlay = document.getElementById('force-click');

        if (!videoSrc) {
            alert("No Video Link Found!");
            window.location.href = "index.html";
        }

        var art = new Artplayer({
            container: '.artplayer-app',
            url: videoSrc,
            type: 'm3u8',
            fullscreen: true,
            fullscreenWeb: true,
            autoplay: false, // Click ke baad start karenge
            autoSize: false,
            autoHeight: false,
            setting: true,
            playbackRate: true,
            aspectRatio: true,
            theme: '#e50914',
            moreVideoAttr: {
                playsInline: true,
                'webkit-playsinline': true,
                style: 'object-fit: contain;'
            },
            customType: {
                m3u8: function (video, url) {
                    if (Hls.isSupported()) {
                        const hls = new Hls();
                        hls.loadSource(url);
                        hls.attachMedia(video);
                    } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                        video.src = url;
                    }
                },
            }
        });

        // Landscape & Fullscreen logic
        function setLandscape() {
            const el = document.documentElement;
            const rfs = el.requestFullscreen || el.webkitRequestFullScreen || el.mozRequestFullScreen || el.msRequestFullscreen;
            
            if (rfs) {
                rfs.call(el).then(() => {
                    if (screen.orientation && screen.orientation.lock) {
                        screen.orientation.lock('landscape').catch(e => console.log("Orientation lock failed"));
                    }
                    overlay.style.display = 'none'; // Click hote hi overlay khatam
                    art.play(); // Video start
                }).catch(e => {
                    overlay.style.display = 'none';
                    art.play();
                });
            }
        }

        // Jab user kahin bhi click karega, tab landscape trigger hoga
        overlay.addEventListener('click', setLandscape);

        // Resize handle
        window.addEventListener('resize', () => art.resize());
    </script>
</body>
</html>
