<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Auto-Rotate Player</title>
    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; }
        .video-js { width: 100vw !important; height: 100vh !important; }
        
        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 10000; display: flex;
            justify-content: center; align-items: center; color: white;
            cursor: pointer; font-family: sans-serif; text-align: center;
        }
        .btn { padding: 20px; border: 2px solid #e50914; border-radius: 10px; background: rgba(229, 9, 20, 0.2); }
    </style>
</head>
<body>

    <div id="overlay">
        <div class="btn">
            <div style="font-size: 40px;">▶</div>
            <p>TAP TO WATCH<br><small>(Auto-Rotate Fullscreen)</small></p>
        </div>
    </div>

    <video id="my-video" class="video-js vjs-default-skin" controls playsinline></video>

    <script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>

    <script>
        const player = videojs('my-video');
        const videoSrc = localStorage.getItem("videoLink") || "YOUR_M3U8_LINK_HERE";

        async function startPlayer() {
            const docElm = document.documentElement;

            // 1. Pehle Fullscreen Request karein
            try {
                if (docElm.requestFullscreen) {
                    await docElm.requestFullscreen();
                } else if (docElm.webkitRequestFullscreen) {
                    await docElm.webkitRequestFullscreen();
                }

                // 2. Fullscreen hone ke baad thoda intezar karein (Important!)
                setTimeout(async () => {
                    if (screen.orientation && screen.orientation.lock) {
                        await screen.orientation.lock('landscape').catch(err => {
                            console.log("Orientation error: " + err);
                        });
                    }
                }, 200);

            } catch (err) {
                console.log("Fullscreen error: " + err);
            }

            // 3. Player Setup aur Play
            player.src({ src: videoSrc, type: 'application/x-mpegURL' });
            document.getElementById('overlay').style.display = 'none';
            player.play();
        }

        document.getElementById('overlay').addEventListener('click', startPlayer);

        // Agar user fullscreen exit kare toh landscape bhi hat jaye
        document.addEventListener('fullscreenchange', () => {
            if (!document.fullscreenElement && screen.orientation.unlock) {
                screen.orientation.unlock();
            }
        });
    </script>
</body>
</html>
