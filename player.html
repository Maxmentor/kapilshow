<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Premium Player | Story Caller</title>
    
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
    
    <style>
        :root {
            --plyr-color-main: #e50914; /* Netflix Red */
        }

        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: #000; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        /* Fullscreen Container */
        .video-container {
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        video {
            width: 100%;
            height: 100%;
        }

        /* Back Button */
        .back-btn {
            position: absolute; top: 20px; left: 20px; z-index: 10;
            background: rgba(0,0,0,0.5); color: white; padding: 10px 15px;
            border-radius: 50%; text-decoration: none; transition: 0.3s;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .back-btn:hover { background: #e50914; }

        /* Custom Overlay for Click-to-Play */
        #force-click {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1000; display: flex; justify-content: center; align-items: center;
            background: radial-gradient(circle, rgba(0,0,0,0.7) 0%, rgba(0,0,0,1) 100%);
            color: white; cursor: pointer; text-align: center;
        }

        .play-icon {
            font-size: 80px; color: #e50914;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.1); opacity: 1; }
            100% { transform: scale(1); opacity: 0.8; }
        }
    </style>
</head>
<body>

    <div id="force-click">
        <div>
            <div class="play-icon"><i class="fas fa-play-circle"></i></div>
            <p style="margin-top: 15px; letter-spacing: 1px; font-weight: bold;">CLICK TO STREAM</p>
        </div>
    </div>

    <a href="index.html" class="back-btn"><i class="fas fa-arrow-left"></i></a>

    <div class="video-container">
        <video id="player" playsinline controls crossorigin></video>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script src="https://cdn.plyr.io/3.7.8/plyr.polyfilled.js"></script>

    <script>
        const video = document.getElementById('player');
        const source = localStorage.getItem("videoLink") || "https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8"; // Testing ke liye default link
        const overlay = document.getElementById('force-click');

        // Initialize Plyr
        const player = new Plyr(video, {
            captions: { active: true, update: true, language: 'en' },
            quality: { default: 720, options: [4320, 2880, 2160, 1440, 1080, 720, 576, 480, 360, 240] }
        });

        if (!source) {
            alert("No Video Link Found!");
            window.location.href = "index.html";
        }

        // HLS Logic
        if (Hls.isSupported()) {
            const hls = new Hls();
            hls.loadSource(source);
            hls.attachMedia(video);
            window.hls = hls;
        } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
            video.src = source;
        }

        // Click to Fullscreen & Play
        overlay.addEventListener('click', () => {
            overlay.style.display = 'none';
            
            // Fullscreen trigger
            const container = document.body;
            if (container.requestFullscreen) { container.requestFullscreen(); }
            else if (container.webkitRequestFullscreen) { container.webkitRequestFullscreen(); }

            // Auto-landscape (Mobile)
            if (screen.orientation && screen.orientation.lock) {
                screen.orientation.lock('landscape').catch(() => {});
            }

            player.play();
        });
    </script>
</body>
</html>
