<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JW Premium Player</title>
    
    <script src="https://ssl.p.jwpcdn.com/7/8/jwplayer.js"></script>
    
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; }
        #player-container { width: 100%; height: 100vh; }

        /* Initial Overlay */
        #start-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 9999; display: flex;
            justify-content: center; align-items: center; color: white;
            cursor: pointer; font-family: sans-serif;
        }
        .play-btn {
            padding: 15px 30px; background: #ff0000; border-radius: 5px;
            font-weight: bold; font-size: 18px; text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div id="start-overlay">
        <div class="play-btn">Click to Play Fullscreen</div>
    </div>

    <div id="player-container"></div>

    <script>
        const videoUrl = localStorage.getItem("videoLink") || "YOUR_TEST_LINK_HERE";

        const playerInstance = jwplayer("player-container");

        playerInstance.setup({
            file: videoUrl,
            type: "hls", // M3U8 ke liye
            width: "100%",
            height: "100%",
            autostart: false,
            stretching: "uniform",
            aspectratio: "16:9",
            primary: "html5"
        });

        async function startStreaming() {
            // 1. Fullscreen Request
            const elem = document.documentElement;
            if (elem.requestFullscreen) {
                await elem.requestFullscreen();
            } else if (elem.webkitRequestFullscreen) {
                await elem.webkitRequestFullscreen();
            }

            // 2. Rotate to Landscape
            if (screen.orientation && screen.orientation.lock) {
                try {
                    await screen.orientation.lock('landscape');
                } catch (err) {
                    console.log("Orientation lock failed: ", err);
                }
            }

            // 3. Play Video
            document.getElementById('start-overlay').style.display = 'none';
            playerInstance.play();
        }

        // Click event listener
        document.getElementById('start-overlay').addEventListener('click', startStreaming);

        // Error handling
        playerInstance.on('setupError', function() {
            alert("JW Player Setup Failed. Check your link or key.");
        });
    </script>
</body>
</html>
