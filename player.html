<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ultimate MKV Player</title>
    
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/dplayer/dist/DPlayer.min.js"></script>

    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; }
        
        #dplayer { width: 100vw; height: 100vh; }

        /* Force Landscape Overlay */
        #play-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 9999; display: flex;
            flex-direction: column; justify-content: center; align-items: center;
            color: white; cursor: pointer; font-family: sans-serif;
        }

        .play-icon {
            font-size: 60px; color: #ff0000; border: 3px solid #ff0000;
            border-radius: 50%; width: 100px; height: 100px;
            display: flex; justify-content: center; align-items: center;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>

    <div id="play-overlay" onclick="initPlayer()">
        <div class="play-icon">▶</div>
        <p style="font-weight: bold; letter-spacing: 1px;">TAP TO START FULLSCREEN</p>
    </div>

    <div id="dplayer"></div>

    <script>
        const videoLink = localStorage.getItem("videoLink") || "APKA_LINK_YAHAN_DAALEIN";

        function initPlayer() {
            // 1. Hide Overlay
            document.getElementById('play-overlay').style.display = 'none';

            // 2. Fullscreen & Rotate Logic
            const el = document.documentElement;
            if (el.requestFullscreen) {
                el.requestFullscreen();
            } else if (el.webkitRequestFullscreen) {
                el.webkitRequestFullscreen();
            }

            if (screen.orientation && screen.orientation.lock) {
                screen.orientation.lock('landscape').catch(e => console.log("Rotate ignore"));
            }

            // 3. Setup DPlayer
            const dp = new DPlayer({
                container: document.getElementById('dplayer'),
                autoplay: true,
                screenshot: true,
                video: {
                    url: videoLink,
                    type: 'auto' // MKV ya M3U8 apne aap pehchan lega
                },
                theme: '#ff0000'
            });

            dp.play();
        }
    </script>
</body>
</html>
